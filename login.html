<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | المكتبة الإلكترونية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-book-open"></i>
            <h2 style="color: var(--accent-light); margin-bottom: 20px;">تسجيل الدخول</h2>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="auth-btn">دخول</button>
            <a href="forgot-password.html" class="nav-btn" style="margin-top: 15px; background: transparent; border: none; font-size: 0.8rem;">نسيت كلمة المرور؟</a>
        </form>
        <div class="auth-footer">
            ليس لديك حساب؟ <a href="register.html">سجل الآن</a>
            <br><br>
            <a href="index.html" style="color: var(--text-muted); font-size: 0.8rem;"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const result = await loginUser(email, password);
            if (result.success) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
